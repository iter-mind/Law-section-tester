<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Georgia,serif;background:#0f0f0f;color:#f1f0eb;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#header{flex-shrink:0;padding:12px 16px 0;background:#0f0f0f;}
.hsubtag{font-size:9px;letter-spacing:4px;color:#f97316;text-transform:uppercase;text-align:center;margin-bottom:3px;}
.htitle{font-size:19px;font-weight:bold;color:#fef3c7;text-align:center;margin-bottom:2px;}
.hdesc{font-size:10px;color:#9ca3af;text-align:center;margin-bottom:10px;}
#tabs{display:flex;gap:6px;margin-bottom:0;}
.tab-btn{flex:1;padding:8px 4px;border-radius:8px 8px 0 0;border:1px solid #374151;border-bottom:none;background:transparent;color:#6b7280;font-size:12px;cursor:pointer;font-family:Georgia,serif;}
.tab-btn.active{border-color:#f97316;background:#1a1a1a;color:#f97316;font-weight:bold;}
.tab-sub{font-size:8px;margin-top:1px;color:#4b5563;}
.tab-btn.active .tab-sub{color:#fdba74;}
.tab-divider{border-bottom:1px solid #374151;}
#content{flex:1;overflow-y:auto;padding:14px 16px 20px;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:#374151;border-radius:3px;}

/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;justify-content:center;}
input[type=text],select{padding:7px 11px;border-radius:8px;border:1px solid #374151;background:#1f2937;color:#f1f0eb;font-size:12px;font-family:Georgia,serif;outline:none;}
input[type=text]{width:155px;}

/* CARDS */
.card{background:#1a1a1a;border-radius:10px;padding:12px 14px;cursor:pointer;margin-bottom:8px;border:1px solid transparent;border-left-width:4px;}
.card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sec-badge{font-family:monospace;font-weight:bold;font-size:12px;padding:3px 9px;border-radius:6px;min-width:64px;text-align:center;}
.card-title{flex:1;font-size:13px;font-weight:600;color:#f1f0eb;min-width:120px;}
.freq-tag{font-size:9px;padding:2px 7px;border-radius:12px;border:1px solid;}
.card-arrow{color:#6b7280;font-size:12px;flex-shrink:0;}
.card-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #2d2d2d;}
.card-detail.open{display:block;}
.detail-ch{font-size:10px;color:#f97316;margin-bottom:5px;letter-spacing:1px;}
.detail-hook{font-size:12px;color:#fef3c7;line-height:1.7;background:#1f2937;padding:10px 12px;border-radius:8px;border-left:3px solid #f97316;}

/* COUNT */
.count{text-align:center;font-size:11px;color:#6b7280;margin-bottom:10px;}

/* DRILL CONFIG */
.drill-box{background:#1a1a1a;border-radius:12px;padding:18px;margin-bottom:14px;}
.drill-label{font-size:11px;color:#f97316;margin-bottom:5px;font-weight:bold;letter-spacing:1px;}
select.full{width:100%;margin-bottom:10px;}
.drill-types{display:flex;gap:8px;margin-bottom:0;}
.dtype-btn{flex:1;padding:9px 6px;border-radius:8px;border:2px solid #374151;background:transparent;color:#9ca3af;font-size:11px;cursor:pointer;font-family:Georgia,serif;line-height:1.4;}
.dtype-btn.active{border-color:#f97316;background:#f9731611;color:#f97316;}
.start-btn{width:100%;padding:14px;border-radius:10px;border:none;background:#f97316;color:white;font-size:15px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;margin-top:10px;}

/* DRILL CARD */
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-bar-bg{background:#1f2937;border-radius:4px;height:4px;margin-bottom:18px;}
.progress-bar{background:#f97316;height:4px;border-radius:4px;transition:width 0.3s;}
.q-card{background:#1a1a1a;border:1px solid #374151;border-radius:14px;padding:24px 18px;margin-bottom:14px;min-height:140px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.q-label{font-size:10px;color:#f97316;letter-spacing:2px;margin-bottom:10px;}
.q-text{font-size:17px;font-weight:bold;color:#fef3c7;line-height:1.5;}
.q-ch{font-size:10px;color:#6b7280;margin-top:8px;}
.reveal-btn{width:100%;padding:14px;border-radius:10px;border:2px solid #f97316;background:transparent;color:#f97316;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:12px;font-family:Georgia,serif;}
.ans-box{background:#052e16;border:1px solid #22c55e44;border-radius:12px;padding:14px;margin-bottom:10px;text-align:center;}
.ans-label{font-size:10px;color:#22c55e;margin-bottom:5px;letter-spacing:1px;}
.ans-text{font-size:20px;font-weight:bold;color:#4ade80;}
.ans-sub{font-size:11px;color:#9ca3af;margin-top:3px;}
.hook-box{background:#1f2937;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#fef3c7;line-height:1.65;border-left:3px solid #f97316;}
.ans-btns{display:flex;gap:8px;}
.btn-correct{flex:1;padding:12px;border-radius:10px;border:none;background:#16a34a;color:white;font-size:13px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;}
.btn-wrong{flex:1;padding:12px;border-radius:10px;border:none;background:#dc2626;color:white;font-size:13px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;}
.btn-skip{flex:0 0 52px;padding:12px 8px;border-radius:10px;border:1px solid #374151;background:transparent;color:#6b7280;font-size:13px;cursor:pointer;font-family:Georgia,serif;}

/* DONE SCREEN */
.done-wrap{text-align:center;padding:20px 0;}
.done-emoji{font-size:44px;margin-bottom:8px;}
.done-title{font-size:22px;font-weight:bold;color:#fef3c7;margin-bottom:4px;}
.done-sub{font-size:13px;color:#9ca3af;margin-bottom:20px;}
.score-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.score-box{background:#1a1a1a;border-radius:10px;padding:12px 14px;min-width:78px;}
.score-num{font-size:26px;font-weight:bold;}
.score-lbl{font-size:10px;color:#9ca3af;margin-top:2px;}
.pct-text{font-size:22px;font-weight:bold;margin-bottom:20px;}
.redrill-btn{width:100%;padding:12px;border-radius:10px;border:1px solid #ef4444;background:#ef444411;color:#ef4444;font-size:13px;cursor:pointer;margin-bottom:10px;font-family:Georgia,serif;}
.newsession-btn{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:transparent;color:#9ca3af;font-size:13px;cursor:pointer;font-family:Georgia,serif;}

/* MAP */
.map-intro{font-size:12px;color:#9ca3af;text-align:center;margin-bottom:14px;}
.map-card{display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:4px solid;}
.map-range{font-family:monospace;font-weight:bold;font-size:13px;padding:4px 10px;border-radius:6px;min-width:74px;text-align:center;}
.map-ch{font-size:12px;font-weight:bold;color:#f1f0eb;}
.map-key{font-size:10px;color:#9ca3af;margin-top:2px;}
.golden-box{background:#1f2937;border-radius:10px;padding:14px;margin-top:8px;}
.golden-title{font-size:11px;color:#f97316;margin-bottom:8px;font-weight:bold;}
.golden-text{font-size:12px;color:#d1d5db;line-height:1.7;}

/* INSTALL BANNER */
.install-banner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid #f97316;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px #00000099;z-index:9999;max-width:340px;width:90%;}
.install-icon{font-size:22px;flex-shrink:0;}
.install-text-wrap{flex:1;}
.install-title{color:#fef3c7;font-size:13px;font-weight:bold;}
.install-sub{color:#9ca3af;font-size:11px;margin-top:2px;}
.install-btn{background:#f97316;color:white;border:none;border-radius:8px;padding:8px 13px;font-size:12px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;white-space:nowrap;}
.install-close{background:transparent;color:#6b7280;border:none;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;}
</style>

const ALL = [
  {sec:"2",title:"Definitions",ch:"Ch 1 · Introduction",freq:4,hook:"Holding/subsidiary/OPC/KMP — MCQ goldmine. 'Sec 2 = definitions, always 2nd nature.'"},
  {sec:"3",title:"Kinds of Company",ch:"Ch 2 · Formation",freq:2,hook:"3 kinds — Public, Private, OPC. Section number = number of types."},
  {sec:"3A",title:"Separate Legal Entity / Effect of Registration",ch:"Ch 2 · Formation",freq:3,hook:"Foundation A. Salomon v Salomon. Company is separate from members."},
  {sec:"7",title:"Incorporation of Company",ch:"Ch 2 · Formation",freq:2,hook:"7 documents filed with ROC. Lucky 7 = getting incorporated is lucky."},
  {sec:"8",title:"Section 8 Company (Non-Profit)",ch:"Ch 2 · Formation",freq:3,hook:"Section 8 Company — the section number IS the name. Impossible to forget."},
  {sec:"9",title:"Effects of Registration",ch:"Ch 2 · Formation",freq:1,hook:"After incorporation (Sec 3), company gets legal effects. 9 = 3² = outcome of formation."},
  {sec:"10",title:"MOA/AOA as Binding Contract",ch:"Ch 2 · Formation",freq:1,hook:"10 = complete. Binding contract between company and ALL members."},
  {sec:"10A",title:"Commencement of Business",ch:"Ch 2 · Formation",freq:3,hook:"10A = Action. Before any action (business), declare ready. Within 180 days of incorporation."},
  {sec:"11",title:"(Omitted)",ch:"Ch 2 · Formation",freq:0,hook:"This section was removed from the Act. If asked = omitted."},
  {sec:"15",title:"Alteration noted in every copy of MOA/AOA",ch:"Ch 2 · Formation",freq:1,hook:"15 = clerical step. After altering MOA/AOA (13/14), every copy must reflect it."},
  {sec:"16",title:"Rectification of Name",ch:"Ch 2 · Formation",freq:2,hook:"Sweet 16 but wrong name. CG directs change in 3 months, company complies in 6 months."},
  {sec:"17",title:"Right of Members to Copies of MOA/AOA",ch:"Ch 2 · Formation",freq:1,hook:"17 = right to know. Members can demand copies."},
  {sec:"19",title:"Subsidiary not to hold shares in Holding Co",ch:"Ch 2 · Formation",freq:1,hook:"19 = reverse ownership banned. Subsidiary cannot own parent's shares."},
  {sec:"20",title:"Service of Documents",ch:"Ch 2 · Formation",freq:1,hook:"20 = communication. Post/email/hand delivery."},
  {sec:"21",title:"Authentication of Documents",ch:"Ch 2 · Formation",freq:1,hook:"21 = adult signature required. MD/Secretary/Director authenticate."},
  {sec:"22",title:"Execution of Bills, Cheques, Hundies",ch:"Ch 2 · Formation",freq:1,hook:"22 = double sign. Bills and cheques need double authorisation."},
  {sec:"4",title:"Memorandum of Association — Contents",ch:"Ch 3 · MOA & AOA",freq:3,hook:"4 = close to 5 clauses of MOA (Name, RO, Objects, Liability, Capital). Sec 4 = contents of MOA."},
  {sec:"5",title:"Articles of Association — Contents",ch:"Ch 3 · MOA & AOA",freq:3,hook:"5th document filed at incorporation. AOA follows MOA just like 4→5."},
  {sec:"6",title:"Act Overrides MOA/AOA",ch:"Ch 3 · MOA & AOA",freq:1,hook:"6 = supreme law. Companies Act beats anything in MOA/AOA that conflicts."},
  {sec:"12",title:"Registered Office",ch:"Ch 3 · MOA & AOA",freq:2,hook:"12 = address. 15 days to establish, 30 days to verify."},
  {sec:"13",title:"Alteration of Memorandum",ch:"Ch 3 · MOA & AOA",freq:3,hook:"13 = MOA. SR + CG/NCLT/RD approval depending on clause."},
  {sec:"14",title:"Alteration of Articles",ch:"Ch 3 · MOA & AOA",freq:3,hook:"14 = AOA. SR required. Comes right after MOA alteration (13)."},
  {sec:"18",title:"Conversion of Companies",ch:"Ch 3 · MOA & AOA",freq:3,hook:"18 = adult, can change identity. Private→Public, Public→Private, Unlimited→Limited."},
  {sec:"23",title:"Kinds of Issue",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"23 = 2+3 = 5 kinds. Public, rights, bonus, private placement, preferential."},
  {sec:"24",title:"SEBI Powers in Public Issues",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"24 = SEBI watches 24/7. Regulates public issues."},
  {sec:"25",title:"Deemed Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:3,hook:"25 = disguised. Offer for sale 'deemed' to be prospectus even if it doesn't look like one."},
  {sec:"26",title:"Contents of Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:2,hook:"26 = 26 letters = exhaustive disclosure. Mandatory matters stated in prospectus."},
  {sec:"27",title:"Variation of Contract Terms in Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"27 = change of mind. SR + consent of holders needed to vary terms."},
  {sec:"28",title:"Offer for Sale by Members",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"28 = 25+3. Existing shareholders selling to public — near Sec 25 for a reason."},
  {sec:"29",title:"Dematerialisation of Securities",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"29 = digital. Mandatory demat for listed companies. No physical certificates."},
  {sec:"30",title:"Advertisement of Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"30 = public announcement. Conditions for advertising prospectus."},
  {sec:"31",title:"Shelf Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:3,hook:"31 = 1 year shelf life. Valid for 1 year from first issue. The 1 is at the end of 31."},
  {sec:"32",title:"Red Herring Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:2,hook:"32 = RHP. Filed before IPO. No price, no quantum. 3+2=5 days before closing = final prospectus."},
  {sec:"33",title:"Abridged Prospectus",ch:"Ch 4 · Prospectus & Allotment",freq:3,hook:"33 = short short. Two 3s = double short = ABRIDGED. Attached to every application form."},
  {sec:"34",title:"Criminal Liability for Misstatement",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"34 = jail. Criminal = more serious, comes before civil (35). Imprisonment + fine."},
  {sec:"35",title:"Civil Liability for Misstatement",ch:"Ch 4 · Prospectus & Allotment",freq:3,hook:"35 = sue. Who is liable + defences (due diligence, expert, withdrawal). 3+5=8 persons liable."},
  {sec:"36",title:"Fraudulent Inducement Penalty",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"36 = fraud. Inducing someone to invest through fraud. 3+6=9 years imprisonment."},
  {sec:"37",title:"Class Action Suit",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"37 = group fight. Members/depositors collectively sue company. Minimum 100 members."},
  {sec:"38",title:"Personation Penalty (Securities)",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"38 = fake identity. Pretending to be someone else to acquire securities."},
  {sec:"39",title:"Allotment of Securities",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"39 = 3+9=12. Minimum subscription must be received, refund within 15 days of failure."},
  {sec:"40",title:"Listing on Stock Exchange",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"40 = 4 exchanges. Securities must be listed on recognised stock exchange."},
  {sec:"41",title:"Global Depository Receipts (GDR)",ch:"Ch 4 · Prospectus & Allotment",freq:1,hook:"41 = global. Indian company issues depository receipts abroad. Opposite of IDR (Sec 390)."},
  {sec:"42",title:"Private Placement",ch:"Ch 4 · Prospectus & Allotment",freq:3,hook:"42 = answer to everything. Alternative to all public routes. Max 200 persons per class per year."},
  {sec:"43",title:"Kinds of Share Capital",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"43 = 4+3=7. Two kinds: equity and preference. Sec 43 classifies them."},
  {sec:"44",title:"Shares as Movable Property",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"44 = 4×4 = movable in 4 directions. Shares transfer freely."},
  {sec:"45",title:"Numbering of Shares",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"45 = roll number. Every share gets a distinct number."},
  {sec:"46",title:"Share Certificate",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"46 = issued within 2 months of allotment. 4+6=10 details in certificate."},
  {sec:"47",title:"Voting Rights",ch:"Ch 5 · Share Capital & Debentures",freq:3,hook:"47 = 4+7=11. Equity votes on ALL. Preference votes ONLY on matters affecting them."},
  {sec:"48",title:"Variation of Shareholders' Rights",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"48 = 4/8 = half. 3/4 consent of that class needed. Fraction = partial consent."},
  {sec:"49",title:"Calls on Uniform Basis",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"49 = equal treatment. All same-class shareholders called on uniform basis."},
  {sec:"50",title:"Advance Calls",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"50 = pay early. Company accepts advance calls, pays interest."},
  {sec:"51",title:"Dividend on Partly Paid Shares",ch:"Ch 5 · Share Capital & Debentures",freq:3,hook:"51 = proportionate. Partly paid = proportionate dividend. 5+1=6 = partial."},
  {sec:"52",title:"Securities Premium Account (SPA)",ch:"Ch 5 · Share Capital & Debentures",freq:3,hook:"52 = SPA. Uses: bonus issue, buyback, preliminary expenses, discount on debentures. 5+2=7 uses."},
  {sec:"53",title:"No Issue at Discount",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"53 = strictly no. Absolute prohibition on shares below face value. Sweat equity is the only exception."},
  {sec:"54",title:"Sweat Equity Shares",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"54 = sweat. SR needed, 15% of paid-up capital limit, 3-year lock-in."},
  {sec:"55",title:"Issue and Redemption of Preference Shares",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"55 = 5+5=10, double=20. Maximum 20 years redemption period. Two 5s = 20."},
  {sec:"56",title:"Transfer and Transmission of Securities",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"56 = SH-4 form. Register within 15 days. 5+6=11 days close to 15."},
  {sec:"57",title:"Personation Penalty (Shares)",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"57 = fake identity for shares. Mirrors Sec 38. Same crime, different chapter."},
  {sec:"58",title:"Refusal of Registration of Transfer",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"58 = 56+2. After transfer (56), company can refuse (58). 30-day notice of refusal."},
  {sec:"59",title:"Rectification of Register of Members",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"59 = fix the register. NCLT orders correction of ROM."},
  {sec:"60",title:"Notice Showing Capital",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"60 = round number = full picture. All notices show authorised, subscribed, paid-up capital."},
  {sec:"61",title:"Alteration of Share Capital",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"61 = 6+1=7. OR needed for consolidation, sub-division, cancellation."},
  {sec:"62",title:"Further Issue of Share Capital (Rights Issue / ESOP)",ch:"Ch 5 · Share Capital & Debentures",freq:4,hook:"62 = Rights. Biggest section in Ch 5. Existing shareholders get FIRST right. 15-30 days offer period."},
  {sec:"63",title:"Bonus Shares",ch:"Ch 5 · Share Capital & Debentures",freq:3,hook:"63 = 62+1. Right after rights issue comes bonus. Sources: free reserves, SPA, CRR. No partly paid."},
  {sec:"64",title:"Notice to ROC of Capital Alteration",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"64 = filing. After altering capital (61), notify ROC within 30 days."},
  {sec:"65",title:"Unlimited Company Reserve Capital",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"65 = rare. Unlimited company converting to limited can designate reserve capital."},
  {sec:"66",title:"Reduction of Share Capital",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"66 = 6+6=12. Double reduction. Tribunal approval + creditor protection + solvency statement."},
  {sec:"67",title:"No Financial Assistance for Own Share Purchase",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"67 = self-dealing banned. 6+7=13 = unlucky = forbidden."},
  {sec:"68",title:"Buyback of Securities",ch:"Ch 5 · Share Capital & Debentures",freq:3,hook:"68 = buy back. 10% Board, 25% SR. 6-month cooling off period."},
  {sec:"69",title:"Capital Redemption Reserve on Buyback",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"69 = 68+1. After buyback, create CRR equal to nominal value. Always follows 68."},
  {sec:"70",title:"Prohibition on Buyback in Certain Cases",ch:"Ch 5 · Share Capital & Debentures",freq:1,hook:"70 = 68+2. When buyback is NOT allowed. Default on deposits/debentures = cannot buyback."},
  {sec:"71",title:"Debentures",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"71 = 7+1=8. DRR, trustee, redemption. Think classic 8% debenture problem."},
  {sec:"72",title:"Power of Nomination",ch:"Ch 5 · Share Capital & Debentures",freq:2,hook:"72 = last in Ch 5. Nomination is end-of-life provision for shares. Nominee gets shares on death."},
  {sec:"88",title:"Register of Members (ROM)",ch:"Ch 6 · Membership",freq:2,hook:"88 = double register. ROM + register of debenture holders. Two 8s = two registers."},
  {sec:"89",title:"Declaration of Beneficial Interest",ch:"Ch 6 · Membership",freq:1,hook:"89 = hidden owner. Beneficial owner different from registered owner. Declare within 30 days."},
  {sec:"90",title:"Significant Beneficial Owners (SBO)",ch:"Ch 6 · Membership",freq:1,hook:"90 = 90% transparent. 25%+ beneficial interest = register in BEN-1."},
  {sec:"91",title:"Closure of Register of Members",ch:"Ch 6 · Membership",freq:1,hook:"91 = shut. Max 30 days at a time, 45 days a year. 10 days newspaper notice before closure."},
  {sec:"92",title:"Annual Return",ch:"Ch 6 · Membership",freq:2,hook:"92 = yearly. MGT-7 filed within 60 days of AGM. 9+2=11 items in annual return."},
  {sec:"93",title:"Return for Change in Promoter Stake",ch:"Ch 6 · Membership",freq:1,hook:"93 = listed company. Return within 15 days of change."},
  {sec:"94",title:"Place of Keeping Registers",ch:"Ch 6 · Membership",freq:1,hook:"94 = location. At RO or elsewhere with SR approval."},

// STATE
// ═══════════════════════════════════════
let currentTab = "study";
let openCards = {};

// Study filters
let studyCh = "All Chapters", studyFreq = "all", studySearch = "";

// Drill state
let drillStarted = false, drillPool = [], drillIdx = 0, drillRevealed = false;

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function fk(f){return Math.min(Math.max(f,0),4);}
function e(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  const c = document.getElementById("content");
  if(currentTab==="study") c.innerHTML = renderStudy();
  else if(currentTab==="drill") c.innerHTML = renderDrill();
  else c.innerHTML = renderMap();
}

// ── STUDY ──
function renderStudy(){
  const filtered = ALL.filter(s=>{
    const chOk = studyCh==="All Chapters"||s.ch===studyCh;
    const fOk = studyFreq==="all"||s.freq===parseInt(studyFreq);
    const srch = !studySearch||s.title.toLowerCase().includes(studySearch.toLowerCase())||String(s.sec).toLowerCase().includes(studySearch.toLowerCase());
    return chOk&&fOk&&srch;
  });

  const chOptions = CHAPTERS.map(c=>`<option value="${e(c)}" ${studyCh===c?"selected":""}>${e(c)}</option>`).join("");
  const cards = filtered.map((s,i)=>{
    const fc=FREQ_COLOR[fk(s.freq)], fb=FREQ_BG[fk(s.freq)];
    const isOpen = openCards[s.sec+s.ch];
    return `<div class="card" style="border-color:${fc}22;border-left-color:${fc}" onclick="toggleCard('${e(s.sec)}','${e(s.ch)}')">
      <div class="card-row">
        <span class="sec-badge" style="background:${fb};color:${fc}">Sec ${e(s.sec)}</span>
        <span class="card-title">${e(s.title)}</span>
        <span class="freq-tag" style="color:${fc};border-color:${fc};background:${fb}55">${FREQ_LABEL[fk(s.freq)]}</span>
        <span class="card-arrow">${isOpen?"▲":"▼"}</span>
      </div>
      <div class="card-detail ${isOpen?"open":""}">
        <div class="detail-ch">${e(s.ch)}</div>
        <div class="detail-hook">💡 ${e(s.hook)}</div>
      </div>
    </div>`;
  }).join("");

  return `
    <div class="filters">
      <input type="text" placeholder="Search..." value="${e(studySearch)}" oninput="studySearch=this.value;render()">
      <select onchange="studyFreq=this.value;render()">
        <option value="all" ${studyFreq==="all"?"selected":""}>All Frequencies</option>
        <option value="4" ${studyFreq==="4"?"selected":""}>🔴 Must Do</option>
        <option value="3" ${studyFreq==="3"?"selected":""}>🟠 High</option>
        <option value="2" ${studyFreq==="2"?"selected":""}>🟡 Moderate</option>
        <option value="1" ${studyFreq==="1"?"selected":""}>🔵 Occasional</option>
      </select>
      <select onchange="studyCh=this.value;openCards={};render()">${chOptions}</select>
    </div>
    <div class="count">${filtered.length} sections · tap card to reveal memory hook</div>
    ${cards}`;
}

// ── DRILL ──
function renderDrill(){
  if(!drillStarted) return renderDrillConfig();
  if(drillDone) return renderDrillDone();
  return renderDrillCard();
}

function renderDrillConfig(){
  const chOptions = CHAPTERS.map(c=>`<option value="${e(c)}" ${drillCh===c?"selected":""}>${e(c)}</option>`).join("");
  return `<div style="padding:10px 0">
    <div class="drill-box">
      <div class="drill-label">CHAPTER</div>
      <select class="full" onchange="drillCh=this.value">${chOptions}</select>
      <div class="drill-label">MINIMUM FREQUENCY</div>
      <select class="full" onchange="drillFreq=this.value">
        <option value="4" ${drillFreq==="4"?"selected":""}>Must Do only (4)</option>
        <option value="3" ${drillFreq==="3"?"selected":""}>High + above (3+)</option>
        <option value="2" ${drillFreq==="2"?"selected":""}>Moderate + above (2+)</option>
        <option value="1" ${drillFreq==="1"?"selected":""}>All sections</option>
      </select>
      <div class="drill-label">DRILL TYPE</div>
      <div class="drill-types">
        <button class="dtype-btn ${drillType==="title→sec"?"active":""}" onclick="drillType='title→sec';render()">See Title<br>→ Recall Section No.</button>
        <button class="dtype-btn ${drillType==="sec→title"?"active":""}" onclick="drillType='sec→title';render()">See Section No.<br>→ Recall Title</button>
      </div>
    </div>
    <button class="start-btn" onclick="startDrill()">Start Drill →</button>
  </div>`;
}

function renderDrillCard(){
  const s = drillPool[drillIdx];
  const total = drillPool.length;
  const pct = Math.round((drillIdx/total)*100);
  const question = drillType==="title→sec" ? s.title : `Section ${s.sec}`;
  const answerText = drillType==="title→sec" ? `Section ${s.sec}` : s.title;
  const answerSub = drillType==="title→sec" ? s.title : `Section ${s.sec}`;

  return `
    <div style="padding:8px 0">
      <div class="progress-row">
        <span style="font-size:12px;color:#9ca3af">${drillIdx+1} / ${total}</span>
        <span style="font-size:11px;color:#22c55e">✓ ${drillScore.correct}</span>
        <span style="font-size:11px;color:#ef4444">✗ ${drillScore.wrong}</span>
        <span style="font-size:11px;color:#6b7280">→ ${drillScore.skipped}</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="q-card">
        <div class="q-label">${drillType==="title→sec"?"WHAT SECTION NUMBER?":"WHAT IS THIS SECTION?"}</div>
        <div class="q-text">${e(question)}</div>
        <div class="q-ch">${e(s.ch)}</div>
      </div>
      ${!drillRevealed
        ? `<button class="reveal-btn" onclick="revealDrill()">Reveal Answer</button>`
        : `<div class="ans-box">
            <div class="ans-label">ANSWER</div>
            <div class="ans-text">${e(answerText)}</div>
            <div class="ans-sub">${e(answerSub)}</div>
           </div>
           <div class="hook-box">💡 ${e(s.hook)}</div>
           <div class="ans-btns">
             <button class="btn-correct" onclick="answerDrill('correct')">✓ Got it</button>
             <button class="btn-wrong" onclick="answerDrill('wrong')">✗ Missed</button>
             <button class="btn-skip" onclick="answerDrill('skipped')">→</button>
           </div>`
      }
    </div>`;
}

function renderDrillDone(){
  const total = drillScore.correct+drillScore.wrong+drillScore.skipped;
  const pct = total ? Math.round((drillScore.correct/total)*100) : 0;
  const emoji = pct>=80?"🏆":pct>=50?"💪":"📚";
  const pctColor = pct>=80?"#22c55e":pct>=50?"#f97316":"#ef4444";
  return `<div class="done-wrap">
    <div class="done-emoji">${emoji}</div>
    <div class="done-title">Session Complete</div>
    <div class="done-sub">${total} sections drilled</div>
    <div class="score-row">
      <div class="score-box"><div class="score-num" style="color:#22c55e">${drillScore.correct}</div><div class="score-lbl">✓ Correct</div></div>
      <div class="score-box"><div class="score-num" style="color:#ef4444">${drillScore.wrong}</div><div class="score-lbl">✗ Wrong</div></div>
      <div class="score-box"><div class="score-num" style="color:#6b7280">${drillScore.skipped}</div><div class="score-lbl">→ Skipped</div></div>
    </div>
    <div class="pct-text" style="color:${pctColor}">${pct}% accuracy</div>
    ${drillWrongList.length>0?`<button class="redrill-btn" onclick="drillWrong()">Drill Wrong Ones Again (${drillWrongList.length})</button>`:""}
    <button class="newsession-btn" onclick="drillStarted=false;render()">New Session</button>
  </div>`;
}

function renderMap(){
  const cards = MAP_DATA.map(m=>`
    <div class="map-card" style="border-left-color:${m.color}">
      <div class="map-range" style="background:${m.color}22;color:${m.color}">${m.range}</div>
      <div><div class="map-ch">${e(m.ch)}</div><div class="map-key">Key: ${e(m.key)}</div></div>
    </div>`).join("");
  return `<div style="padding:8px 0 20px">
    <div class="map-intro">Know this map → you always know which range to look in</div>
    ${cards}
    <div class="golden-box">
      <div class="golden-title">THE GOLDEN RULE</div>
      <div class="golden-text">Sections follow the company's life journey:<br>
      <span style="color:#fef3c7">Birth → Structure → Money → People → Meetings → Accounts → Audit</span><br><br>
      When asked about a section, ask: <span style="color:#f97316">where does this topic fall in the company's life?</span> That gives you the range. Then sequence logic gives the exact number.</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function toggleCard(sec, ch){
  const key=sec+ch;
  openCards[key]=!openCards[key];
  render();
  if(openCards[key]){
    setTimeout(()=>{
      const cards=document.querySelectorAll(".card");
      for(const c of cards){if(c.querySelector(".sec-badge")?.textContent.includes(sec)){c.scrollIntoView({behavior:"smooth",block:"nearest"});break;}}
    },50);
  }
}
function startDrill(){
  const base = ALL.filter(s=>{
    const chOk = drillCh==="All Chapters"||s.ch===drillCh;
    const fOk = s.freq>=parseInt(drillFreq);
    return chOk&&fOk;
  });
  drillPool=shuffle(base);
  drillIdx=0; drillRevealed=false;
  drillScore={correct:0,wrong:0,skipped:0};
  drillDone=false; drillWrongList=[];
  drillStarted=true;
  render();
}
function revealDrill(){ drillRevealed=true; render(); }
function answerDrill(result){
  if(result==="wrong") drillWrongList.push(drillPool[drillIdx]);
  drillScore[result]++;
  if(drillIdx+1>=drillPool.length){ drillDone=true; render(); return; }
  drillIdx++; drillRevealed=false; render();
  document.getElementById("content").scrollTo({top:0,behavior:"smooth"});
}
function drillWrong(){
  drillPool=shuffle(drillWrongList);
  drillIdx=0; drillRevealed=false;
  drillScore={correct:0,wrong:0,skipped:0};
  drillDone=false; drillWrongList=[];
  render();
}

// ═══════════════════════════════════════
// PWA — SERVICE WORKER
// ═══════════════════════════════════════
const swCode = `
self.addEventListener('install',e=>{
  e.waitUntil(caches.open('law-memory-v1').then(c=>c.addAll([location.href])));
  self.skipWaiting();
});
self.addEventListener('activate',e=>self.clients.claim());
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request))));
});`;
if('serviceWorker' in navigator){
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(()=>{});
}

// ═══════════════════════════════════════
// PWA — INSTALL BANNER
// ═══════════════════════════════════════
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e; showInstallBanner();
});
function showInstallBanner(){
  if(document.getElementById('install-banner')) return;
  const b=document.createElement('div');
  b.id='install-banner'; b.className='install-banner';
  b.innerHTML=`<span class="install-icon">⚖️</span>
    <div class="install-text-wrap">
      <div class="install-title">Add to Home Screen</div>
      <div class="install-sub">Open like an app, works offline</div>
    </div>
    <button class="install-btn" onclick="installApp()">Install</button>
    <button class="install-close" onclick="document.getElementById('install-banner').remove()">✕</button>`;
  document.body.appendChild(b);
}
async function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner')?.remove();
}
// iOS Safari
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
if(isIOS&&!window.navigator.standalone){
  setTimeout(()=>{
    if(document.getElementById('install-banner')) return;
    const b=document.createElement('div');
    b.id='install-banner'; b.className='install-banner'; b.style.alignItems='flex-start';
    b.innerHTML=`<span class="install-icon">⚖️</span>
      <div class="install-text-wrap">
        <div class="install-title">Add to Home Screen</div>
        <div class="install-sub">Tap <b style="color:#f97316">Share ⬆️</b> in Safari, then <b style="color:#f97316">"Add to Home Screen"</b></div>
      </div>
      <button class="install-close" onclick="document.getElementById('install-banner').remove()">✕</button>`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),12000);
  },1500);
}

render();
